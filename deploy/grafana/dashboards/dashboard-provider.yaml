apiVersion: 1

# Two providers so that dashboards split across two Grafana folders:
#   - "Validators" — per-node logs and (future) consensus-state views
#   - "Watchtower" — the monitoring stack's own host + container resources
#
# Each provider points at a subdirectory so Grafana only picks up the JSON
# intended for that folder. allowUiUpdates=true lets operators tweak layouts
# in the browser; changes are non-persistent (overwritten on next reload).
providers:
  - name: validators
    orgId: 1
    folder: Validators
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/validators
      foldersFromFilesStructure: false

  - name: watchtower
    orgId: 1
    folder: Watchtower
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/watchtower
      foldersFromFilesStructure: false
