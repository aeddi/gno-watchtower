# VictoriaMetrics scrape targets. Loaded via -promscrape.config so VM pulls
# metrics from these endpoints in addition to accepting remote writes from
# the watchtower forwarder.
#
# What each target gives us:
#   node        — host CPU/mem/disk/net/load (node_exporter, :9100)
#   cadvisor    — per-container CPU/mem/net breakdown (cadvisor, :8080)
#   watchtower  — traffic counters + retention config (internal :8080/metrics)
#   loki        — ingester chunk counts + per-tenant ingest stats (:3100/metrics)
#   vm          — self-scrape: rows ingested, data size, series count (:8428/metrics)
scrape_configs:
  - job_name: node
    scrape_interval: 15s
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets:
          - cadvisor:8080
    metric_relabel_configs:
      # cAdvisor's default metric set is huge and includes duplicate paths
      # (container_fs_*, container_blkio_*, etc.) that we don't query from
      # dashboards. Drop everything not in the common query list to keep the
      # index compact on a long-lived dev/prod cluster. Re-enable as needed.
      - source_labels: [__name__]
        regex: "container_(cpu_usage_seconds_total|memory_usage_bytes|memory_working_set_bytes|network_receive_bytes_total|network_transmit_bytes_total|fs_reads_bytes_total|fs_writes_bytes_total|last_seen|spec_memory_limit_bytes)"
        action: keep

  - job_name: watchtower
    scrape_interval: 15s
    static_configs:
      - targets:
          - watchtower:8080

  - job_name: loki
    scrape_interval: 30s
    static_configs:
      - targets:
          - loki:3100

  - job_name: vm
    scrape_interval: 30s
    static_configs:
      - targets:
          - victoria-metrics:8428
