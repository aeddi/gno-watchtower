services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: config.env
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      watchtower:
        condition: service_healthy
      grafana:
        condition: service_healthy

  watchtower:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["run", "/etc/watchtower/config.toml"]
    volumes:
      - ./watchtower.toml:/etc/watchtower/config.toml:ro
    environment:
      # Surface retention windows via /metrics so dashboards can show
      # "used / limit" panels without reparsing config.env at query time.
      LOGS_RETENTION: "${LOGS_RETENTION}"
      METRICS_RETENTION: "${METRICS_RETENTION}"
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      victoria-metrics:
        condition: service_healthy
      loki:
        condition: service_healthy

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.115.0
    command:
      - "-retentionPeriod=${METRICS_RETENTION}"
      - "-storageDataPath=/data"
      - "-storage.minFreeDiskSpaceBytes=10737418240"
      - "-promscrape.config=/etc/vm/scrape.yml"
    volumes:
      - vm_data:/data
      - ./victoria-metrics/scrape.yml:/etc/vm/scrape.yml:ro
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.rootfs=/host"
      # Collectors off by default because they're noisy or useless in containers.
      - "--no-collector.wifi"
      - "--no-collector.hwmon"
      - "--no-collector.ipvs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)"
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - monitoring
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.4
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    env_file: config.env
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    env_file: config.env
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  monitoring:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  vm_data:
  loki_data:
  grafana_data:
