# Main-branch Docker images: publishes a floating :main tag + immutable
# :sha-* tag for both sentinel and beacon on every push to main. Also runs
# on PRs as a build-only validation (no registry push, no packages:write
# scope) so broken Dockerfiles are caught before merge.
#
# Binaries are NOT built here — that happens on tag push via release.yml.
# This workflow exists so devs who want to run bleeding-edge images can do
# `docker pull .../{sentinel,beacon}:main` without waiting for a release cut.
name: main-image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Deny by default; each job opts in to what it needs.
permissions: {}

concurrency:
  group: main-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR builds: validate both Dockerfiles compile for both platforms; no push.
  # Deliberately no packages:write scope — a compromised action in the build
  # graph can't exfiltrate the registry token if the job never had it.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: sentinel, dockerfile: sentinel.Dockerfile }
          - { name: beacon, dockerfile: beacon.Dockerfile }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  # Push builds: tag :main + :sha-* and publish to GHCR for both images.
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: sentinel, dockerfile: sentinel.Dockerfile }
          - { name: beacon, dockerfile: beacon.Dockerfile }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aeddi/gno-watchtower/${{ matrix.image.name }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-,format=short
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
