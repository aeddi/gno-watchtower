# Conventional Commit → versioned release via release-please.
#
# On every push to main, release-please scans commits since the last tag. If
# any are release-worthy (feat:, fix:, BREAKING CHANGE, etc.), it opens or
# updates a single "chore(main): release <version>" PR that bumps the
# version, updates CHANGELOG.md, and computes release notes.
#
# Merging that PR tags the new version and publishes a GitHub Release. On
# the tag push, release.yml fires and builds + attaches binaries and the
# Docker image.
#
# IMPORTANT: release-please authenticates via a dedicated GitHub App (NOT
# the default GITHUB_TOKEN). Two reasons:
#   1. Tags pushed with GITHUB_TOKEN don't trigger other workflows (GitHub's
#      loop-prevention policy), so release.yml would never fire.
#   2. Commits authored via a GitHub App token are auto-signed by GitHub's
#      web-flow key, so `required_signatures` branch rulesets accept them.
#      A fine-grained PAT produces unsigned commits and would be rejected.
#
# Setup: create a GitHub App with `contents: write` + `pull-requests: write`
# on this repo, install it, then store the App ID as RELEASE_PLEASE_APP_ID
# and the private key (.pem contents) as RELEASE_PLEASE_APP_PRIVATE_KEY.
#
# First run will propose v0.1.0. See the README "Versioning" section.
name: release-please

on:
  push:
    branches: [main]

# Deny by default; the job below opts in to just what it needs.
permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write # release-please commits CHANGELOG + pushes tags
      pull-requests: write # release-please opens / updates the Release PR
    env:
      RELEASE_PLEASE_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
      RELEASE_PLEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
    steps:
      # Fail loudly when the App credentials are missing. Without them the
      # action would fall back to GITHUB_TOKEN, silently producing unsigned
      # commits that `required_signatures` rejects — and tags that don't
      # cascade into release.yml. Better to block here than discover after
      # a silent non-release.
      - name: Require GitHub App credentials
        if: env.RELEASE_PLEASE_APP_ID == '' || env.RELEASE_PLEASE_APP_PRIVATE_KEY == ''
        run: |
          echo "::error title=Missing GitHub App credentials::Configure secrets RELEASE_PLEASE_APP_ID and RELEASE_PLEASE_APP_PRIVATE_KEY (GitHub App with contents:write + pull-requests:write, installed on this repo). See the README 'Versioning' section."
          exit 1
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ env.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: go
          package-name: gno-watchtower
          target-branch: main
